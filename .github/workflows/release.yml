name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Extract the block between the current version heading and the next ## heading.
          # Uses index() for literal substring matching — regex would interpret [ ] as
          # character class metacharacters and fail on "## [1.2.0]" headings.
          NOTES=$(awk -v ver="## [$VERSION]" '
            found && /^## \[/ { exit }
            found { print }
            index($0, ver) == 1 { found=1 }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::error::Version $VERSION not found in CHANGELOG.md"
            exit 1
          fi

          # Write to file — safe for multiline content
          echo "$NOTES" > release_notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('release_notes.md', 'utf8').trim();
            const tag = context.ref.replace('refs/tags/', '');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: notes,
              draft: false,
              prerelease: tag.includes('-'),
            });

  publish-npm:
    name: Publish to npm (Trusted Publishing via OIDC)
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write          # required for npm Trusted Publishing OIDC token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'    # Trusted Publishing requires Node >= 22.14.0
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to support Trusted Publishing
        # --force works around a known self-upgrade bug where arborist unlinks
        # its own transitive deps (e.g. promise-retry) mid-upgrade and leaves
        # the install in a broken MODULE_NOT_FOUND state. Requires npm >= 11.5.1.
        run: npm install -g npm@latest --force

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Smoke test CLI
        run: node bin/ba-toolkit.js --version

      - name: Publish to npm
        # No NPM_TOKEN needed: npm CLI 11.5.1+ uses the OIDC token automatically
        # when permissions.id-token: write is set. Provenance attestations are
        # published automatically (visible as "verified" badge on npmjs.com).
        # The empty NODE_AUTH_TOKEN env var clears the default that
        # actions/setup-node sets — otherwise it interferes with OIDC auth.
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ''
