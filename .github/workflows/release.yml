name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Extract the block between the current version heading and the next ## heading.
          # Uses index() for literal substring matching — regex would interpret [ ] as
          # character class metacharacters and fail on "## [1.2.0]" headings.
          NOTES=$(awk -v ver="## [$VERSION]" '
            found && /^## \[/ { exit }
            found { print }
            index($0, ver) == 1 { found=1 }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::error::Version $VERSION not found in CHANGELOG.md"
            exit 1
          fi

          # Write to file — safe for multiline content
          echo "$NOTES" > release_notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('release_notes.md', 'utf8').trim();
            const tag = context.ref.replace('refs/tags/', '');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: notes,
              draft: false,
              prerelease: tag.includes('-'),
            });

  publish-npm:
    name: Publish to npm (Trusted Publishing via OIDC)
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write          # required for npm Trusted Publishing OIDC token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'    # Trusted Publishing requires Node >= 22.14.0
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm 11.5.1 (bypass broken bundled npm)
        # The npm bundled with Node 22.22.2 in the runner toolcache is broken:
        # @npmcli/arborist is missing its transitive dep `promise-retry`, so
        # any `npm install` (including self-upgrade, even with --force) dies
        # with MODULE_NOT_FOUND before it can reify anything.
        #
        # We bypass the broken npm entirely: download the npm tarball from the
        # registry with curl and drop it into node_modules in place of the
        # broken copy. No npm is invoked during the replacement.
        #
        # Trusted Publishing (OIDC) requires npm CLI >= 11.5.1.
        run: |
          set -eux
          NPM_VERSION=11.5.1
          NODE_PREFIX="$(node -p 'path.dirname(path.dirname(process.execPath))')"
          NODE_MODULES_DIR="$NODE_PREFIX/lib/node_modules"
          TMPDIR="$(mktemp -d)"
          curl -fsSL "https://registry.npmjs.org/npm/-/npm-${NPM_VERSION}.tgz" \
            | tar -xz -C "$TMPDIR"
          rm -rf "$NODE_MODULES_DIR/npm"
          mv "$TMPDIR/package" "$NODE_MODULES_DIR/npm"
          npm --version

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Smoke test CLI
        run: node bin/ba-toolkit.js --version

      - name: Strip classic auth from .npmrc (enable OIDC flow)
        # actions/setup-node with `registry-url` writes an .npmrc containing
        # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` and
        # `always-auth=true`. With NODE_AUTH_TOKEN empty this becomes a
        # configured-but-empty token, so npm thinks classic auth is set and
        # never starts the OIDC token exchange — publish dies with ENEEDAUTH.
        #
        # Remove both lines so npm 11.5.1+ detects GitHub Actions OIDC and
        # uses Trusted Publishing. The file path comes from the
        # NPM_CONFIG_USERCONFIG env var that setup-node exports.
        run: |
          set -eux
          NPMRC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$NPMRC" ]; then
            sed -i '/:_authToken=/d' "$NPMRC"
            sed -i '/^always-auth=/d' "$NPMRC"
            echo "--- .npmrc after strip ---"
            cat "$NPMRC" || true
          fi

      - name: Publish to npm
        # No NPM_TOKEN needed: npm CLI 11.5.1+ uses the OIDC token automatically
        # when permissions.id-token: write is set. Provenance attestations are
        # published automatically (visible as "verified" badge on npmjs.com).
        # Requires Trusted Publisher configured on npmjs.com for this package,
        # pointing at this repo and workflow filename.
        run: npm publish --access public
