name: Validate BA Toolkit Artifacts

on:
  pull_request:
    paths:
      - 'output/**'
      - 'skills/**'
      - 'bin/**'
      - 'test/**'
      - 'package.json'

jobs:
  validate-artifacts:
    name: Validate artifact structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run artifact validator
        run: python .github/scripts/validate_artifacts.py

  validate-skills:
    name: Validate skill files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all SKILL.md files have required frontmatter
        run: |
          set -e
          FAIL=0
          for skill_file in skills/*/SKILL.md; do
            if ! grep -q "^name:" "$skill_file"; then
              echo "::error file=$skill_file::Missing 'name:' in frontmatter"
              FAIL=1
            fi
            if ! grep -q "^description:" "$skill_file"; then
              echo "::error file=$skill_file::Missing 'description:' in frontmatter"
              FAIL=1
            fi
            echo "  ✓ $skill_file"
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::One or more SKILL.md files have invalid frontmatter."
            exit 1
          fi
          echo "All skill files valid."

      - name: Check interview skills reference the Interview Protocol
        # Every SKILL.md that has an Interview section must link to
        # references/interview-protocol.md so the AI assistant follows
        # the one-question-at-a-time + 3–5 options + free-text rule.
        # Catches the regression of a new skill shipping a raw
        # questionnaire dump instead of the conversational flow.
        run: |
          set -e
          FAIL=0
          for skill_file in skills/*/SKILL.md; do
            if grep -qE '^(## |### [0-9]+\. )Interview' "$skill_file"; then
              if ! grep -qF "interview-protocol.md" "$skill_file"; then
                echo "::error file=$skill_file::SKILL.md has an Interview section but does not link to references/interview-protocol.md"
                FAIL=1
              fi
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "All interview skills reference the protocol."

      - name: Check domain reference files have required sections
        run: |
          set -e
          REQUIRED_SECTIONS=("## 1. /brief" "## 2. /srs" "## 6. /nfr" "## 7. /datadict" "## Domain Glossary")
          FAIL=0
          for domain_file in skills/references/domains/*.md; do
            for section in "${REQUIRED_SECTIONS[@]}"; do
              if ! grep -qF "$section" "$domain_file"; then
                echo "::warning file=$domain_file::Missing section: $section"
              fi
            done
            echo "  ✓ $domain_file"
          done
          echo "Domain reference check complete."

  run-tests:
    name: Run CLI tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        # Zero-dep test suite (node:test + node:assert) — no install step
        # needed. Mirrors the test gate in release.yml so regressions are
        # caught at PR time, not at tag push.
        run: npm test
